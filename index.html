    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Montserrat"', 'sans-serif'],
            },
            colors: {
              gold: {
                100: '#FFFBE6', 
                200: '#FDF2C0',
                300: '#F0D478', 
                400: '#D4AF37', 
                500: '#C5A028',
                600: '#997B19', 
                900: '#3d2b05',
              },
              rose: {
                100: '#ffe4e6',
                300: '#fda4af',
                400: '#fb7185',
                500: '#e11d48',
                900: '#881337',
              },
              void: '#0a0a0a', 
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2.5s infinite linear',
              'float': 'float 8s ease-in-out infinite',
              'zoom-in': 'zoomIn 1.5s ease-out forwards',
              'grain': 'grain 8s steps(10) infinite',
              'heartbeat-bg': 'heartbeatBg 3s ease-in-out infinite',
              'fade-up': 'fadeUp 1.5s ease-out forwards',
              'blur-in': 'blurIn 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'blur-in-slow': 'blurIn 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'shake': 'shake 0.5s linear infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% center' },
                '100%': { backgroundPosition: '200% center' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              zoomIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              blurIn: {
                '0%': { opacity: '0', filter: 'blur(12px)', transform: 'scale(0.98)' },
                '100%': { opacity: '1', filter: 'blur(0)', transform: 'scale(1)' },
              },
              grain: {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '10%': { transform: 'translate(-5%, -5%)' },
                '20%': { transform: 'translate(-10%, 5%)' },
                '30%': { transform: 'translate(5%, -10%)' },
                '40%': { transform: 'translate(-5%, 15%)' },
                '50%': { transform: 'translate(-10%, 5%)' },
                '60%': { transform: 'translate(15%, 0)' },
                '70%': { transform: 'translate(0, 10%)' },
                '80%': { transform: 'translate(-15%, 0)' },
                '90%': { transform: 'translate(10%, 5%)' },
              },
              heartbeatBg: {
                 '0%, 100%': { opacity: '0.3' },
                 '50%': { opacity: '0.5' },
              },
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shake: {
                '0%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-1px)' },
                '50%': { transform: 'translateX(1px)' },
                '75%': { transform: 'translateX(-1px)' },
                '100%': { transform: 'translateX(0)' },
              }
            }
          },
        },
      }
    </script>

<body>

    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;

      // ==========================================

      // ==========================================
      const WIN_PROBABILITY = 0.35; 
      const TOP_PRIZE_IDS =; 

      // AUDIO
      const AUDIO_INTRO = "https://cdn.pixabay.com/audio/2022/08/02/audio_884fe92c21.mp3";

      // MURO DE RECUERDOS
      const SIDEBAR_PHOTOS = [

      // PREMIOS Y SÍMBOLOS
      const SYMBOLS = [

          posterGradient: "bg-gradient-to-br from-gray-900 to-black",

        },
        {

          title: "Sorpresa Especial",

          posterGradient: "bg-gradient-to-br from-indigo-900 to-black",

        },
        {
          id: 7,
          emoji: "✈️",

          gradient: "bg-gradient-to-br from-blue-600 to-cyan-500",
          posterGradient: "bg-gradient-to-br from-blue-900 to-black",

        },
        {
          id: 8,
          emoji: "🎁",
          title: "Regalo Secreto",
          gradient: "bg-gradient-to-br from-orange-500 to-amber-500",
          posterGradient: "bg-gradient-to-br from-orange-900 to-black",
          theme: "#FFA500",
          message: "Un detalle único pensado solo para ti.",
        },
        {
          id: 9,
          emoji: "❤️",
          title: "Amor Eterno",
          gradient: "bg-gradient-to-br from-red-600 to-crimson-900",
          posterGradient: "bg-gradient-to-br from-red-950 to-black",
          theme: "#DC143C",
          message: "Tú eres mi mejor premio, hoy y siempre.",
        },
      ];

      const SYMBOL_HEIGHT = 200; 
      const REEL_SPEED_BASE = 2500; 
      const REEL_DELAY = 800;

      const GameState = {
        INTRO: 'INTRO',
        IDLE: 'IDLE',
        SPINNING: 'SPINNING',
        WON: 'WON',
        LOST: 'LOST'
      };

      // ==========================================
      // COMPONENT: CONFETTI
      // ==========================================
      const Confetti = () => {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;

          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          let width = window.innerWidth;
          let height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;

          const particles = [];
          const colors = ['#FFD700', '#FF0000', '#FFFFFF', '#C0C0C0', '#800020'];

          class Particle {
            constructor() {
              this.x = Math.random() * width;
              this.y = Math.random() * height - height;
              this.dx = Math.random() * 4 - 2;
              this.dy = Math.random() * 3 + 3;
              this.size = Math.random() * 10 + 5;
              this.color = colors[Math.floor(Math.random() * colors.length)];
              this.tilt = Math.random() * 10;
              this.tiltAngle = Math.random() * 0.1;
            }

            update() {
              this.y += this.dy;
              this.x += this.dx + Math.sin(this.tilt);
              this.tilt += this.tiltAngle;

              if (this.y > height) {
                this.y = -20;
                this.x = Math.random() * width;
              }
            }

            draw() {
              if (!ctx) return;
              ctx.beginPath();
              ctx.lineWidth = this.size;
              ctx.strokeStyle = this.color;
              ctx.moveTo(this.x + this.tilt + (this.size / 2), this.y);
              ctx.lineTo(this.x + this.tilt, this.y + this.size + (this.tilt / 2));
              ctx.stroke();
            }
          }

          for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
          }

          let animationId;
          const animate = () => {
            ctx.clearRect(0, 0, width, height);
            particles.forEach((p) => {
              p.update();
              p.draw();
            });
            animationId = requestAnimationFrame(animate);
          };

          animate();

          const handleResize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
          };

          window.addEventListener('resize', handleResize);

          return () => {
            cancelAnimationFrame(animationId);
            window.removeEventListener('resize', handleResize);
          };
        }, []);

        return (
          <canvas
            ref={canvasRef}
            className="fixed inset-0 pointer-events-none z-50"
          />
        );
      };

      // ==========================================
      // COMPONENT: REEL
      // ==========================================
      const Reel = ({ isSpinning, stopIndex, delay, onStop, showMystery, forceStop }) => {
        const [blur, setBlur] = useState(false);
        const displaySymbols = [...SYMBOLS, ...SYMBOLS, ...SYMBOLS, ...SYMBOLS]; 
        const BASE_OFFSET_INDEX = SYMBOLS.length * 2; 

        const stripRef = useRef(null);
        const timeoutRef = useRef(null);

        useEffect(() => {
          if (isSpinning) {
             if (timeoutRef.current) clearTimeout(timeoutRef.current);

             if (stripRef.current) {
               stripRef.current.style.transition = 'none';
               stripRef.current.style.transform = `translateY(0px)`;
             }
             
             if (stripRef.current) {
                // Force reflow safely
                void stripRef.current.offsetHeight;
             }

             const currentDuration = forceStop ? 200 : (REEL_SPEED_BASE + delay);

             timeoutRef.current = setTimeout(() => {
                if (stripRef.current) {
                  stripRef.current.style.transition = `transform ${currentDuration}ms cubic-bezier(0.2, 0, 0.2, 1)`; 
                  
                  const landingIndex = BASE_OFFSET_INDEX + (stopIndex || 0);
                  const targetY = -((landingIndex - 1) * SYMBOL_HEIGHT);
                  
                  stripRef.current.style.transform = `translateY(${targetY}px)`;
                  
                  if (!forceStop) setBlur(true);

                  setTimeout(() => {
                    setBlur(false);
                    onStop();
                  }, currentDuration);
                }
             }, 50);
          }
          return () => { if (timeoutRef.current) clearTimeout(timeoutRef.current); }
        }, [isSpinning, stopIndex, delay, forceStop, onStop]);


        return (
          <div className={`relative overflow-hidden w-full h-[600px] bg-transparent ${isSpinning ? 'animate-shake' : ''}`}>
            
            {showMystery && (
              <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-transparent">
                   <div className="animate-pulse-slow">
                      <span className="text-7xl text-rose-300/30 font-serif font-bold drop-shadow-[0_0_10px_rgba(251,113,133,0.3)]">?</span>
                   </div>
              </div>
            )}

            <div 
              ref={stripRef}
              className="w-full will-change-transform"
              style={{ filter: blur ? 'blur(3px) brightness(1.2)' : 'none' }}
            >
              {displaySymbols.map((s, i) => (
                <div 
                  key={`${s.id}-${i}`} 
                  className="flex flex-col items-center justify-center box-border p-2"
                  style={{ height: `${SYMBOL_HEIGHT}px` }}
                >
                   {s.image ? (
                      <div className="w-36 h-36 flex items-center justify-center relative overflow-hidden rounded-md shadow-2xl transform transition-transform duration-500 hover:scale-105">
                         <img 
                            src={s.image} 
                            alt={s.title} 
                            className="absolute inset-0 w-full h-full object-cover opacity-90" 
                            onError={(e) => { console.log("Error cargando imagen:", e.currentTarget.src); }}
                         />
                         <div className="absolute inset-0 bg-gradient-to-tr from-rose-500/20 to-transparent mix-blend-overlay"></div>
                      </div>
                   ) : (
                      <div className="w-36 h-36 flex items-center justify-center">
                          <span className="text-7xl relative z-10 drop-shadow-[0_0_15px_rgba(225,29,72,0.5)]">{s.emoji}</span>
                      </div>
                   )}
                </div>
              ))}
            </div>
          </div>
        );
      };

      // ==========================================
      // COMPONENT: WINMODAL
      // ==========================================
      const WinModal = ({ data, onClose }) => {
        const [showContent, setShowContent] = useState(false);

        useEffect(() => {
          if (data) {
            const timer = setTimeout(() => setShowContent(true), 100);
            return () => clearTimeout(timer);
          }
        }, [data]);

        if (!data) return null;

        const { symbol } = data;

        return (
          <div className="fixed inset-0 z- flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
            <div 
              className={`
                 relative bg-void border border-rose-500/30 p-8 md:p-12 max-w-lg w-full rounded-xl shadow-[0_0_50px_rgba(225,29,72,0.3)]
                 flex flex-col items-center text-center
                 transition-all duration-700 transform
                 ${showContent ? 'scale-100 opacity-100 translate-y-0' : 'scale-90 opacity-0 translate-y-10'}
              `}
            >
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-rose-500/10 blur-3xl -z-10 rounded-full"></div>

              <div className="mb-6 relative">
                 <div className="absolute inset-0 bg-gold-400 blur-2xl opacity-20 animate-pulse-slow"></div>
                 {symbol.image ? (
                    <div className="w-40 h-40 md:w-48 md:h-48 rounded-full overflow-hidden border-4 border-gold-400 shadow-2xl relative z-10">
                      <img src={symbol.image} alt="Prize" className="w-full h-full object-cover" />
                    </div>
                 ) : (
                    <span className="text-8xl md:text-9xl drop-shadow-[0_0_15px_rgba(255,215,0,0.6)] relative z-10">{symbol.emoji}</span>
                 )}
              </div>

              <h2 className="text-3xl md:text-5xl font-serif font-bold text-gold-400 mb-4 tracking-wider uppercase drop-shadow-md">
                {symbol.title}
              </h2>

              <div className="h-px w-20 bg-rose-500/50 mb-6"></div>

              <p className="text-lg md:text-xl text-rose-100 font-light italic mb-10 leading-relaxed">
                "{symbol.message}"
              </p>

              <button 
                onClick={onClose}
                className="px-8 py-3 bg-rose-600 hover:bg-rose-500 text-white rounded-full font-sans tracking-widest uppercase text-sm shadow-lg transition-all hover:scale-105 hover:shadow-rose-500/50"
              >
                Collect Gift for Lidise
              </button>
            </div>
          </div>
        );
      };

      // ==========================================
      // COMPONENT: INTROSCREEN
      // ==========================================
      const IntroScreen = ({ onComplete }) => {
        const [step, setStep] = useState(0);
        const [subStep, setSubStep] = useState(0);
        const [isFading, setIsFading] = useState(false);
        const audioRef = useRef(null);

        const TRANSITION_DURATION = 2000;

        // Memoized particles to prevent re-render flickering
        const particles = useMemo(() => Array.from({ length: 30 }).map((_, i) => ({
          id: i,
          left: Math.random() * 100 + '%',
          top: Math.random() * 100 + '%',
          animationDelay: Math.random() * 5 + 's',
          opacity: Math.random() * 0.4 + 0.1,
          size: Math.random() * 2 + 1 + 'px'
        })), []);

        const handleStart = () => {
          if (audioRef.current) {
            audioRef.current.volume = 0;
            audioRef.current.play().then(() => {
              const fadeInterval = setInterval(() => {
                if (audioRef.current && audioRef.current.volume < 0.5) { 
                   audioRef.current.volume = Math.min(0.5, audioRef.current.volume + 0.05);
                } else {
                   clearInterval(fadeInterval);
                }
              }, 200);
            }).catch(e => console.error("Audio play failed (autoplay block?):", e));
          }
          
          setIsFading(true);
          setTimeout(() => {
              setStep(1);
              setSubStep(0);
              setIsFading(false);
          }, TRANSITION_DURATION);
        };

        const handleFinalTap = () => {
            setIsFading(true);
            if (audioRef.current) {
               const fadeOutInterval = setInterval(() => {
                 if (audioRef.current && audioRef.current.volume > 0.05) {
                    audioRef.current.volume -= 0.05;
                 } else {
                    clearInterval(fadeOutInterval);
                    if (audioRef.current) audioRef.current.pause();
                 }
               }, 100);
            }
            setTimeout(() => {
                onComplete();
            }, TRANSITION_DURATION);
        };

        useEffect(() => {
          let timers = [];

          if (step === 1) {
              timers.push(setTimeout(() => setSubStep(1), 3500)); 
              timers.push(setTimeout(() => setIsFading(true), 7500));
              timers.push(setTimeout(() => { setStep(2); setSubStep(0); setIsFading(false); }, 9500));
          } else if (step === 2) {
              timers.push(setTimeout(() => setSubStep(1), 3500)); 
              timers.push(setTimeout(() => setIsFading(true), 7500));
              timers.push(setTimeout(() => { setStep(3); setSubStep(0); setIsFading(false); }, 9500));
          } else if (step === 3) {
              timers.push(setTimeout(() => setSubStep(1), 3500)); 
              timers.push(setTimeout(() => setIsFading(true), 7500));
              timers.push(setTimeout(() => { setStep(4); setSubStep(0); setIsFading(false); }, 9500));
          } else if (step === 4) {
              timers.push(setTimeout(() => setSubStep(1), 3000)); 
              timers.push(setTimeout(() => setSubStep(2), 6000)); 
              timers.push(setTimeout(() => setSubStep(3), 9000)); 
          }

          return () => timers.forEach(clearTimeout);
        }, [step]);

        const renderContent = () => {
            if (step === 0) {
                return (
                   <div className="flex flex-col items-center justify-center animate-blur-in px-4 text-center w-full max-w-4xl mx-auto">
                        <div className="mb-8 p-1 border-t border-b border-gold-400/30 w-16"></div>
                        
                        <h1 className="text-3xl sm:text-4xl md:text-6xl font-serif italic text-lux-gold tracking-tight mb-8 leading-tight whitespace-nowrap overflow-visible">
                           Feliz San Valentín Lidise <span className="text-2xl md:text-5xl not-italic ml-2 text-red-600 animate-pulse inline-block drop-shadow-[0_0_10px_rgba(220,38,38,0.5)]">❤️</span>
                        </h1>
                        
                        <p className="text-gold-100/60 font-sans font-extralight tracking-[0.3em] uppercase text-[10px] md:text-sm animate-pulse-slow mt-4">
                           Hecho con amor para Lidise Nuñez
                        </p>

                        <div className="mt-16 group cursor-pointer" onClick={handleStart}>
                          <div className="px-10 py-3 border border-gold-400/20 rounded-sm hover:bg-gold-400/5 hover:border-gold-400/40 transition-all duration-1000 ease-out">
                               <span className="font-serif italic text-gold-200 text-lg tracking-widest group-hover:tracking-[0.2em] transition-all duration-1000">
                                   Comenzar
                               </span>
                          </div>
                        </div>
                   </div>
                );
            }

            const textContainerStyle = "flex flex-col items-center justify-center space-y-10 text-center px-6 max-w-3xl";
            const mainTextStyle = "text-2xl md:text-4xl font-serif italic text-lux-gold leading-relaxed animate-blur-in";
            const subTextStyle = "text-xl md:text-3xl font-serif text-white/90 leading-relaxed animate-blur-in-slow";

            if (step === 1) {
                return (
                    <div className={textContainerStyle}>
                        <p className={mainTextStyle}>
                            "Hay regalos que se compran…"
                        </p>
                        {subStep >= 1 && (
                            <p className={subTextStyle}>
                                Y otros que se sienten.
                            </p>
                        )}
                    </div>
                );
            }

            if (step === 2) {
                return (
                    <div className={textContainerStyle}>
                        <p className={mainTextStyle}>
                            "Hoy quise hacer algo diferente…"
                        </p>
                        {subStep >= 1 && (
                            <p className={subTextStyle}>
                                Algo solo para ti.
                            </p>
                        )}
                    </div>
                );
            }

            if (step === 3) {
                 return (
                    <div className={textContainerStyle}>
                        <p className={mainTextStyle}>
                            "A veces la magia está en no saber…"
                        </p>
                        {subStep >= 1 && (
                            <p className={subTextStyle}>
                                Qué sorpresa viene después.
                            </p>
                        )}
                    </div>
                );
            }

            if (step === 4) {
                return (
                    <div className="flex flex-col items-center justify-center space-y-8 text-center px-4">
                        <p className="text-3xl md:text-5xl font-serif italic text-lux-gold animate-blur-in">
                            Respira.
                        </p>
                        {subStep >= 1 && (
                            <p className="text-3xl md:text-5xl font-serif italic text-lux-gold animate-blur-in-slow">
                                Sonríe.
                            </p>
                        )}
                        {subStep >= 2 && (
                            <p className="text-xl md:text-3xl font-serif italic text-gold-100 tracking-wide animate-blur-in mt-10 drop-shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                                Y deja que la sorpresa comience.
                            </p>
                        )}
                        {subStep >= 3 && (
                             <button 
                              onClick={handleFinalTap}
                              className="mt-12 px-12 py-4 bg-transparent border border-gold-500/20 text-gold-100 rounded-sm font-serif italic text-xl hover:bg-gold-500/5 hover:border-gold-500/40 hover:scale-105 transition-all duration-[1500ms] animate-blur-in"
                            >
                              Tap to Begin
                            </button>
                        )}
                    </div>
                );
            }
            return null;
        };

        return (
          <div className={`fixed inset-0 z-50 flex items-center justify-center transition-opacity duration-1000 ${isFading ? 'opacity-0' : 'opacity-100'}`}>
              <audio ref={audioRef} src={AUDIO_INTRO} loop />
              
              {/* Background Particles */}
              <div className="absolute inset-0 overflow-hidden pointer-events-none">
                  {particles.map((p) => (
                      <div 
                          key={p.id}
                          className="absolute bg-gold-400 rounded-full animate-pulse"
                          style={{
                              left: p.left,
                              top: p.top,
                              width: p.size,
                              height: p.size,
                              opacity: p.opacity,
                              animationDelay: p.animationDelay
                          }}
                      />
                  ))}
              </div>

              {renderContent()}
          </div>
        );
      };

      // ==========================================
      // COMPONENT: SIDEBARPHOTO
      // ==========================================
      const SidebarPhoto = ({ src, index, side }) => {
        const rotation = (index % 2 === 0 ? 1 : -1) * ((index * 7) % 12); 
        const margin = side === 'left' ? (index % 3 === 0 ? 'ml-8' : 'ml-2') : (index % 3 === 0 ? 'mr-8' : 'mr-2');
        
        return (
          <div 
            className={`
              relative w-28 h-36 md:w-36 md:h-44 lg:w-44 lg:h-52 
              transition-all duration-700 ease-out 
              hover:scale-110 hover:z-50 hover:rotate-0
              ${margin}
              transform
            `}
            style={{ 
              transform: `rotate(${rotation}deg)`,
              marginTop: index === 0 ? '0' : '-25px' 
            }}
          >
            <div className="absolute inset-0 p-2 bg-white/5 backdrop-blur-sm border border-white/10 shadow-lg transition-all duration-500 hover:bg-white hover:border-white">
              <img 
                src={src} 
                alt="Memory" 
                className="w-full h-full object-cover grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-500" 
              />
            </div>
          </div>
        );
      };

      // ==========================================
      // COMPONENT: APP (MAIN)
      // ==========================================
      const App = () => {
        const [gameState, setGameState] = useState(GameState.INTRO);
        const [reelPositions, setReelPositions] = useState([null, null, null]);
        const [delays, setDelays] = useState([0, REEL_DELAY, REEL_DELAY * 2]);
        
        const reelPositionsRef = useRef([null, null, null]);
        const [winData, setWinData] = useState(null);
        const [showMystery, setShowMystery] = useState(true);
        const [isForceStopping, setIsForceStopping] = useState(false);
        
        // AUTO-SCALING LOGIC
        const [scale, setScale] = useState(1);
        useEffect(() => {
          const handleResize = () => {
            const h = window.innerHeight;
            const targetHeight = 880;
            const buffer = 40; 
            let newScale = 1;
            if (h < targetHeight) {
              newScale = (h - buffer) / targetHeight;
            } else {
              newScale = Math.min(h / targetHeight, 1.6);
            }
            newScale = Math.max(newScale, 0.5); 
            setScale(newScale);
          };
          handleResize();
          window.addEventListener('resize', handleResize);
          return () => window.removeEventListener('resize', handleResize);
        }, []);

        const spinCountRef = useRef(0);
        const reelsStoppedCount = useRef(0);
        const spinSoundRef = useRef(null);
        const winSoundRef = useRef(null);
        const heartbeatRef = useRef(null);

        const leftPhotos = SIDEBAR_PHOTOS.slice(0, Math.ceil(SIDEBAR_PHOTOS.length / 2));
        const rightPhotos = SIDEBAR_PHOTOS.slice(Math.ceil(SIDEBAR_PHOTOS.length / 2));

        const handleIntroComplete = () => {
          setGameState(GameState.IDLE);
        };

        const generatePositions = (forceWin, targetId) => {
          let r1, r2, r3;
          if (forceWin) {
             let winnerIndex;
             if (targetId) {
                winnerIndex = SYMBOLS.findIndex(s => s.id === targetId);
             } else {
                const winnerId = TOP_PRIZE_IDS[Math.floor(Math.random() * TOP_PRIZE_IDS.length)];
                winnerIndex = SYMBOLS.findIndex(s => s.id === winnerId);
             }
             if (winnerIndex !== -1) {
                 r1 = winnerIndex; r2 = winnerIndex; r3 = winnerIndex;
             } else {
                 r1 = 0; r2 = 0; r3 = 0;
             }
          } else {
             r1 = Math.floor(Math.random() * SYMBOLS.length);
             r2 = Math.floor(Math.random() * SYMBOLS.length);
             r3 = Math.floor(Math.random() * SYMBOLS.length);
             if (r1 === r2 && r2 === r3) {
                 r3 = (r3 + 1) % SYMBOLS.length;
             }
          }
          return [r1, r2, r3];
        };

        const updatePositions = (newPositions) => {
            setReelPositions(newPositions);
            reelPositionsRef.current = newPositions;
        };

        const determineOutcome = (currentSpinCount) => {
          if (currentSpinCount === 1 || currentSpinCount === 2 || currentSpinCount === 3) {
            return { isWin: false };
          }
          else if (currentSpinCount === 4) {
            return { isWin: true, targetId: 3 };
          }
          else if (currentSpinCount === 5 || currentSpinCount === 6) {
             return { isWin: false };
          }
          else if (currentSpinCount === 7) {
            const targetId = Math.random() < 0.5 ? 1 : 2;
            return { isWin: true, targetId };
          }
          else {
             return { isWin: Math.random() < WIN_PROBABILITY };
          }
        };

        const spin = useCallback(() => {
          if (gameState === GameState.SPINNING) {
              setIsForceStopping(true);
              if (heartbeatRef.current) {
                  heartbeatRef.current.pause();
                  heartbeatRef.current.currentTime = 0;
              }
              const lossPositions = generatePositions(false); 
              updatePositions(lossPositions);
              return;
          }

          setGameState(GameState.SPINNING);
          setShowMystery(false);
          setWinData(null);
          setIsForceStopping(false);
          reelsStoppedCount.current = 0;
          
          spinCountRef.current += 1;
          const currentSpinCount = spinCountRef.current;

          if (spinSoundRef.current) {
              spinSoundRef.current.currentTime = 0;
              spinSoundRef.current.loop = true;
              spinSoundRef.current.volume = 0.8; 
              spinSoundRef.current.play().catch(() => {});
          }

          const outcome = determineOutcome(currentSpinCount);
          const [t1, t2, t3] = generatePositions(outcome.isWin, outcome.targetId);

          let newDelays = [0, REEL_DELAY, REEL_DELAY * 2];
          
          if (t1 === t2) {
              newDelays = [0, REEL_DELAY, REEL_DELAY + 2500]; 
              setTimeout(() => {
                  if (heartbeatRef.current && !isForceStopping) {
                      heartbeatRef.current.currentTime = 0;
                      heartbeatRef.current.volume = 1.0;
                      heartbeatRef.current.play().catch(() => {});
                      if (spinSoundRef.current) spinSoundRef.current.volume = 0.3;
                  }
              }, REEL_DELAY * 1.5);
          }
          
          setDelays(newDelays);
          updatePositions([t1, t2, t3]);

        }, [gameState, isForceStopping]);

        const handleReelStop = useCallback(() => {
          reelsStoppedCount.current += 1;
          if (navigator.vibrate) navigator.vibrate(50);

          if (reelsStoppedCount.current === 3) {
            if (spinSoundRef.current) {
               spinSoundRef.current.pause();
               spinSoundRef.current.currentTime = 0;
            }
            if (heartbeatRef.current) {
               heartbeatRef.current.pause();
               heartbeatRef.current.currentTime = 0;
            }

            setIsForceStopping(false);

            const [p1, p2, p3] = reelPositionsRef.current;
            
            if (p1 !== null && p1 === p2 && p2 === p3) {
              setGameState(GameState.WON);
              setWinData({ symbol: SYMBOLS[p1] });
              if (winSoundRef.current) winSoundRef.current.play().catch(() => {});
              if (navigator.vibrate) navigator.vibrate();
            } else {
              setGameState(GameState.IDLE);
            }
          }
        }, []); 

        return (
          <div className="relative w-screen h-screen bg-void text-white overflow-hidden flex flex-col items-center justify-center font-sans selection:bg-rose-500 selection:text-white">
            
            <div className="absolute inset-0 bg-gradient-to-b from-rose-900/40 via-void to-void z-0"></div>
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] bg-rose-500/10 blur-[100px] rounded-full z-0 animate-heartbeat-bg pointer-events-none"></div>

            <div className="bg-grain"></div>
            <div className="vignette"></div>
            <div className={`cinema-bar top-0 ${gameState !== GameState.INTRO ? '!h-[5vh]' : '!h-0'}`}></div>
            <div className={`cinema-bar bottom-0 ${gameState !== GameState.INTRO ? '!h-[5vh]' : '!h-0'}`}></div>

            <audio ref={spinSoundRef} src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630cc098.mp3" /> 
            <audio ref={winSoundRef} src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3" />
            <audio ref={heartbeatRef} src={AUDIO_HEARTBEAT} />

            {gameState === GameState.INTRO && <IntroScreen onComplete={handleIntroComplete} />}
            {gameState === GameState.WON && <Confetti />}

            <div className={`
              absolute inset-0 z-10 flex justify-between items-center pointer-events-auto py-4
              transition-opacity duration-1000
              ${gameState === GameState.INTRO ? 'opacity-0' : 'opacity-100'}
              ${gameState === GameState.WON ? 'opacity-0' : ''}
            `}>
              <div className="w-40 xl:w-56 h-full overflow-hidden flex flex-col items-center justify-center mask-linear-fade">
                 {leftPhotos.map((photo, idx) => (
                   <SidebarPhoto key={`left-${idx}`} src={photo} index={idx} side="left" />
                 ))}
              </div>
              
              <div className="w-40 xl:w-56 h-full overflow-hidden flex flex-col items-center justify-center mask-linear-fade">
                 {rightPhotos.map((photo, idx) => (
                   <SidebarPhoto key={`right-${idx}`} src={photo} index={idx} side="right" />
                 ))}
              </div>
            </div>

            <div 
              className={`
                relative z-20 flex flex-col items-center justify-center
                transition-all duration-[800ms] ease-out
                ${gameState === GameState.INTRO ? 'opacity-0 blur-sm' : 'opacity-100 blur-0'}
                ${gameState === GameState.WON ? 'opacity-0 blur-md pointer-events-none' : ''}
              `}
              style={{
                transform: `scale(${scale})`,
                transformOrigin: 'center center',
                width: '100%',
                maxWidth: '1200px'
              }}
            >
              
              <header className="mb-6 text-center relative">
                <h1 className="text
