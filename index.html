<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Love Jackpot 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .gold-text { color: #D4AF37; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, black 95%); pointer-events: none; }
        .sidebar { width: 60px; height: 100vh; display: flex; flex-direction: column; gap: 10px; padding: 10px; overflow: hidden; }
        @media (min-width: 768px) { .sidebar { width: 150px; } }
        .photo-card { width: 100%; aspect-ratio: 3/4; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="vignette"></div>
    
    <div class="flex h-screen w-screen items-center justify-between relative z-10">
        <div class="sidebar" id="left-sidebar"></div>

        <div class="flex-1 flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-3xl md:text-5xl font-serif font-bold mb-2 tracking-tighter" style="color: #f3cfc6;">LOVE JACKPOT</h1>
            <p class="text-[10px] tracking-[0.3em] uppercase opacity-60 mb-8">Exclusivo para Lidise Nuñez</p>

            <div class="flex gap-2 mb-10">
                <div class="w-20 h-32 md:w-32 md:h-48 bg-zinc-900 border border-rose-500/30 flex items-center justify-center text-4xl rounded-lg shadow-2xl">?</div>
                <div class="w-20 h-32 md:w-32 md:h-48 bg-zinc-900 border border-rose-500/30 flex items-center justify-center text-4xl rounded-lg shadow-2xl">?</div>
                <div class="w-20 h-32 md:w-32 md:h-48 bg-zinc-900 border border-rose-500/30 flex items-center justify-center text-4xl rounded-lg shadow-2xl">?</div>
            </div>

            <button onclick="location.reload()" class="border border-rose-500/50 px-8 py-3 rounded-full uppercase tracking-widest text-sm hover:bg-rose-900/20 transition-all">
                Spin the Future
            </button>
        </div>

        <div class="sidebar" id="right-sidebar"></div>
    </div>

    <script>
        const photos = [
            "1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", 
            "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg", "10.jpeg", 
            "11.jpeg", "12.jpeg", "13.jpeg", "14.jpeg", "15.jpeg"
        ];

        function fillSidebars() {
            const left = document.getElementById('left-sidebar');
            const right = document.getElementById('right-sidebar');

            photos.slice(0, 8).forEach(p => {
                const img = document.createElement('img');
                img.src = `./Public/${p}`;
                img.className = 'photo-card';
                left.appendChild(img);
            });

            photos.slice(8, 15).forEach(p => {
                const img = document.createElement('img');
                img.src = `./Public/${p}`;
                img.className = 'photo-card';
                right.appendChild(img);
            });
        }
        fillSidebars();
    </script>
</body>
</html>
